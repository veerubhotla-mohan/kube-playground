apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 3                   # desired number of Pod replicas
  selector:
    matchLabels:
      app: nginx                # must match template.metadata.labels
  strategy:
    type: RollingUpdate         # default; use Recreate to terminate all pods first
    rollingUpdate:
      maxUnavailable: 1         # at most 1 Pod unavailable during the update
      maxSurge: 1               # at most 1 extra Pod above the desired count
  template:
    metadata:
      labels:
        app: nginx              # must match spec.selector.matchLabels
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
