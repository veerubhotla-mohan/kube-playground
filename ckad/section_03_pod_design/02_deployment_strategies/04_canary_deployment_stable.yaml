apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-stable
spec:
  replicas: 4                     # majority of traffic goes here
  selector:
    matchLabels:
      app: my-app
      track: stable
  template:
    metadata:
      labels:
        app: my-app
        track: stable
    spec:
      containers:
        - name: app
          image: nginx:1.25       # current stable version
