apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  initContainers:
    - name: init-setup
      image: busybox:1.36
      # Runs to completion before any main container starts
      command: ["sh", "-c", "echo 'Init: preparing environment...' && sleep 2 && echo 'Init: done'"]
  containers:
    - name: app
      image: nginx:1.25          # only starts after all initContainers succeed
