apiVersion: v1
kind: Pod
metadata:
  name: secret-entire-env
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "env | grep -E 'username|password' && sleep 3600"]
      envFrom:
        - secretRef:
            name: app-credentials  # import all keys as env vars
