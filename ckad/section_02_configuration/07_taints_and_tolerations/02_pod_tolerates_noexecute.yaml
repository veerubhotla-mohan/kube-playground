apiVersion: v1
kind: Pod
metadata:
  name: maintenance-aware-app
spec:
  tolerations:
    - key: maintenance
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 300 # Stay bound for 5 minutes after the taint appears
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]