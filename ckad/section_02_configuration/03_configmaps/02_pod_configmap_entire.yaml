apiVersion: v1
kind: Pod
metadata:
  name: configmap-entire-env
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "env | grep -E 'APP_COLOR|APP_MODE' && sleep 3600"]
      envFrom:
        - configMapRef:
            name: app-settings   # import all ConfigMap keys as env vars