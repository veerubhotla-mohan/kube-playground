apiVersion: v1
kind: Pod
metadata:
  name: configmap-specific-key
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo APP_COLOR=$APP_COLOR && sleep 3600"]
      env:
        - name: APP_COLOR
          valueFrom:
            configMapKeyRef:
              name: app-settings
              key: APP_COLOR   # pull only one key from the ConfigMap