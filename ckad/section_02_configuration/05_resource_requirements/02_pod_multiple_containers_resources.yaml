apiVersion: v1
kind: Pod
metadata:
  name: sidecar-with-resources
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "while true; do date; sleep 10; done"]
      resources:
        requests:
          cpu: "200m"
          memory: "128Mi"
        limits:
          cpu: "400m"
          memory: "256Mi"
    - name: logger
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo logging; sleep 15; done"]
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
